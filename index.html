<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>&#128179; Finance</h1>

  <div class="top-actions">
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="exportCSV()">&#128200; Exportar CSV</button>
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="document.getElementById('csv-file').click()">&#128200; Importar CSV</button>
    <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(event)">
  </div>

  <!-- Month filter -->
  <div class="month-filter">
    &nbsp;&#128197;&nbsp; <select id="month-sel"><option value="all">Todos</option></select>
  </div>

  <!-- Balance -->
  <div class="balance">
    <div class="card"><small>Receitas</small><div class="value val-green" id="income">R$ 0,00</div></div>
    <div class="card"><small>Despesas</small><div class="value val-red" id="expense">R$ 0,00</div></div>
    <div class="card"><small>Saldo</small><div class="value val-white" id="balance">R$ 0,00</div></div>
  </div>

  <!-- Form -->
  <div class="form-row" id="add-form">
    <label>Tipo
      <select id="f-type" onchange="updateCat()"></select>
    </label>
    <label>Categoria <select id="f-cat"></select></label>
    <label>Descri&ccedil;&atilde;o <input id="f-desc" placeholder="ex: Sal&aacute;rio"></label>
    <label>Valor (R$) <input id="f-amount" inputmode="numeric" class="money-input" placeholder="0,00"></label>
    <label>Data <input id="f-date" type="date"></label>
    <label class="checkbox-label">
      <input type="checkbox" id="f-recurring"> Recorrente (mensal)
    </label>
    <button class="btn btn-add" onclick="addTx()">Adicionar</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-t="overview">Vis&atilde;o Geral</button>
    <button class="tab" data-t="categories">Categorias</button>
    <button class="tab" data-t="budgets">Or&ccedil;amentos</button>
  </div>

  <!-- VISAO GERAL -->
  <div class="tab-content active" id="tab-overview">
    <!-- Chart -->
    <div class="chart-section"><h2>Por categoria</h2><div class="bar-wrap" id="cat-chart"></div></div>
    <div class="chart-section" style="margin-top:16px"><h2>Por m&ecirc;s</h2><div class="bar-wrap" id="month-chart"></div></div>

    <div class="chart-section" style="margin-top:20px">
      <h2>Transa&ccedil;&otilde;es</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Tipo</th><th>Cat</th><th>Descri&ccedil;&atilde;o</th><th>Valor</th><th>Data</th><th></th></tr></thead>
          <tbody id="tx-list"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- CATEGORIES TAB -->
  <div class="tab-content" id="tab-categories">
    <div class="cats-grid" id="cats-grid"></div>
  </div>

  <!-- BUDGETS TAB -->
  <div class="tab-content" id="tab-budgets">
    <div class="budget-section">
      <h2>Or&ccedil;amentos mensais</h2>
      <div class="budget-input-row" id="budget-form" style="display:none">
        <select id="budget-cat"></select>
        <input id="budget-amount-input" type="number" step="0.01" min="0" placeholder="Limite R$">
        <button class="btn-add-budget" onclick="addBudget()">Definir</button>
      </div>
      <button class="btn-budget" onclick="showBudgetForm()" style="margin-bottom:12px">+ Novo or&ccedil;amento</button>
      <div id="budgets-grid"></div>
    </div>

    <div class="budget-section">
      <h2>Transa&ccedil;&otilde;es recorrentes</h2>
      <div id="recurring-grid"></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Editar Transa&ccedil;&atilde;o</h3>
    <input type="hidden" id="e-id">
    <label>Tipo <select id="e-type" onchange="updateEditCat()"></select></label>
    <label>Categoria <select id="e-cat"></select></label>
    <label>Descri&ccedil;&atilde;o <input id="e-desc"></label>
    <label>Valor (R$) <input id="e-amount" inputmode="numeric" class="money-input"></label>
    <label>Data <input id="e-date" type="date"></label>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveTx()">Salvar</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="confirm-modal-overlay" id="confirm-ov" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="confirm-modal">
    <h3>Confirmar</h3>
    <p id="confirm-msg">Tem certeza?</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" id="confirm-no">Cancelar</button>
      <button class="btn-confirm-del" id="confirm-yes">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast-c" class="toast-container"></div>

<script>
const API = '';
let cats = {};

/* ---- util ---- */
const fmt = v => parseFloat(v||0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
function getTxs() { return JSON.parse(localStorage.getItem('finance_txs')||'[]'); }
function saveTxs(txs) { localStorage.setItem('finance_txs', JSON.stringify(txs)); }
function getRecurring() { return JSON.parse(localStorage.getItem('finance_recurring')||'[]'); }
function saveRecurring(r) { localStorage.setItem('finance_recurring', JSON.stringify(r)); }
function getBudgets() { return JSON.parse(localStorage.getItem('finance_budgets')||'{}'); }
function saveBudgets(b) { localStorage.setItem('finance_budgets', JSON.stringify(b)); }

/* ---- currency mask ---- */
function setupMoneyInput(el) {
  el.addEventListener('input', () => {
    let digits = el.value.replace(/\D/g, '');
    if (!digits) { el.value = ''; return; }
    while (digits.length < 3) digits = '0' + digits;
    const cents = digits.slice(-2);
    const intPart = digits.slice(0, -2);
    el.value = 'R$ ' + Number(intPart).toLocaleString('pt-BR') + ',' + cents;
  });
}
function parseMoney(raw) {
  if (!raw) return NaN;
  let digits = raw.replace(/\D/g, '');
  if (digits.length < 3) return digits === '' ? NaN : parseInt(digits) / 100;
  return parseInt(digits) / 100;
}

/* ---- toast ---- */
function toast(msg, type='success') {
  let c = document.getElementById('toast-c');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ---- confirm ---- */
function confirmDel(msg, onYes) {
  const ev = document.getElementById('confirm-ov');
  document.getElementById('confirm-msg').textContent = msg;
  ev.classList.add('open');
  document.getElementById('confirm-yes').onclick = () => { ev.classList.remove('open'); onYes(); };
  document.getElementById('confirm-no').onclick = () => { ev.classList.remove('open'); };
}

/* ---- recurring sync ---- */
function syncRecurring() {
  if (Object.keys(cats).length === 0) return;
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  const txs = getTxs();
  const existingKeys = new Set(txs.filter(t=>t.recurringId).map(t=>t.recurringId+'-'+t.date.slice(0,7)));
  const recurring = getRecurring();
  let changed = false;

  for (const rec of recurring) {
    const key = rec.id + '-' + ym;
    if (!existingKeys.has(key)) {
      const day = Math.min(rec.day || 1, 28);
      const date = `${ym}-${String(day).padStart(2,'0')}`;
      const maxId = txs.length ? Math.max(...txs.map(t=>t.id)) : 0;
      txs.push({id:maxId+1, type:rec.type, category:rec.category, description:rec.description, amount:rec.amount, date, recurringId:rec.id});
      changed = true;
    }
  }
  if (changed) saveTxs(txs);
}

/* ---- load ---- */
function populateMonthFilter() {
  const sel = document.getElementById('month-sel');
  const txs = getTxs();
  const months = new Set();
  for (const t of txs) months.add(t.date.slice(0,7));
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  months.add(ym);

  sel.innerHTML = '';
  const all = document.createElement('option');
  all.value = 'all'; all.textContent = 'Todos';
  sel.appendChild(all);

  const sorted = [...months].sort().reverse();
  for (const m of sorted) {
    const [y,mo] = m.split('-');
    const d = new Date(y, mo-1);
    const o = document.createElement('option');
    o.value = m;
    o.textContent = d.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
    if (m === ym) o.selected = true;
    sel.appendChild(o);
  }
}

async function load() {
  syncRecurring();
  const r = await fetch(`${API}/api/categories`);
  const j = await r.json();
  cats = j.data;

  for (const t of Object.keys(cats)) {
    const sel = document.getElementById('f-type');
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t === 'receita' ? 'Receita' : 'Despesa';
    if (t === 'expense') opt.selected = true;
    sel.appendChild(opt);
  }

  // edit modal type
  const eType = document.getElementById('e-type');
  eType.innerHTML = '';
  for (const type of Object.keys(cats)) {
    const o = document.createElement('option');
    o.value = type; o.textContent = type === 'receita' ? 'Receita' : 'Despesa';
    eType.appendChild(o);
  }

  updateCat();
  setupMoneyInput(document.getElementById('f-amount'));
  setupMoneyInput(document.getElementById('e-amount'));

  // populate budget cat select
  const bSel = document.getElementById('budget-cat');
  bSel.innerHTML = '';
  for (const [k] of Object.entries(cats.expense?.icons||{})) {
    const o = document.createElement('option'); o.value = k; o.textContent = k;
    bSel.appendChild(o);
  }

  populateMonthFilter();
  refresh();
}

function updateCat() {
  const t = document.getElementById('f-type').value;
  const sel = document.getElementById('f-cat');
  sel.innerHTML = '';
  for (const c of Object.keys(cats[t]?.icons || {})) {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  }
}

function updateEditCat() {
  const t = document.getElementById('e-type').value;
  const sel = document.getElementById('e-cat');
  sel.innerHTML = '';
  if (!cats[t]) return;
  for (const c of Object.keys(cats[t].icons)) {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  }
}

function refresh() {
  syncRecurring();
  const allTxs = getTxs();
  allTxs.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);

  // Balance cards always show ALL-TIME totals
  const ineAll = allTxs.filter(t=>t.type==='receita').reduce((s,t)=>s+t.amount,0);
  const expAll = allTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('income').textContent = fmt(ineAll);
  document.getElementById('expense').textContent = fmt(expAll);
  document.getElementById('balance').textContent = fmt(ineAll-expAll);

  // Month filter only affects table and category chart
  const mSel = document.getElementById('month-sel');
  const month = mSel.value;
  let txs = month !== 'all' ? allTxs.filter(t=>t.date && t.date.startsWith(month)) : allTxs;

  // table
  const tb = document.getElementById('tx-list');
  tb.innerHTML = '';
  if (!txs.length) { tb.innerHTML='<tr><td colspan="6"><div class="empty">Nenhuma transacao</div></td></tr>'; }
  for (const t of txs) {
    const tr = document.createElement('tr');
    const label = t.type === 'receita' ? 'Receita' : 'Despesa';
    const pill = t.type === 'receita' ? 'pill-receita' : 'pill-expense';
    const recTag = t.recurringId ? '<span class="recurring-tag">recorrente</span>' : '';
    tr.innerHTML = `
      <td><span class="pill ${pill}">${label}</span>${recTag}</td>
      <td>${cats[t.type]?.icons?.[t.category] || ''} ${t.category}</td>
      <td>${t.description}</td>
      <td>${fmt(t.amount)}</td>
      <td>${new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR')}</td>
      <td><button class="btn btn-del" onclick="editTx(${t.id})">✏</button><button class="btn btn-del" onclick="delTx(${t.id})">✕</button></td>
    `;
    tb.appendChild(tr);
  }

  // cat chart — reflects current filter
  const byC={};
  for(const t of txs){ const k=t.type+'|'+t.category; byC[k]=(byC[k]||0)+t.amount; }
  const maxC = Math.max(1, ...Object.values(byC));
  const cc = document.getElementById('cat-chart');
  cc.innerHTML = '';
  for(const[k,v]of Object.entries(byC).sort((a,b)=>b[1]-a[1])){
    const[type,cat]=k.split('|');
    const ic=cats[type]?.icons?.[cat]||'';
    cc.innerHTML+=`<div class="bar-row"><span>${ic} ${cat}</span><div class="bar-bg"><div class="bar-fill" style="width:${(v/maxC)*100}%;background:${cats[type]?.color||'#888'}"></div></div><div class="bar-amount">${fmt(v)}</div></div>`;
  }

  // month chart — always ALL time
  const byM={};
  for(const t of allTxs){ const m=t.date.slice(0,7); const k=m+'|'+(t.type==='receita'?'💚':'❤️'); byM[k]=(byM[k]||0)+t.amount; }
  const maxM = Math.max(1, ...Object.values(byM));
  const mc = document.getElementById('month-chart');
  mc.innerHTML = '';
  for(const[k,v]of Object.entries(byM)){
    const[mon,tag]=k.split('|');
    mc.innerHTML+=`<div class="bar-row"><span>${mon} ${tag}</span><div class="bar-bg"><div class="bar-fill" style="width:${(v/maxM)*100}%;background:${tag==='💚'?'#4ade80':'#f87171'}"></div></div><div class="bar-amount">${fmt(v)}</div></div>`;
  }

  renderBudgets(txs);
  showRecurring();
}

async function addTx() {
  const type = document.getElementById('f-type').value;
  const category = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseMoney(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  const isRecurring = document.getElementById('f-recurring').checked;
  if (!desc || !amount || !date) return toast('Preencha todos os campos','error');
  if (amount <= 0) return toast('Valor deve ser maior que zero','error');

  // persist locally too (for offline)
  const txs = getTxs();
  const id = txs.length ? Math.max(...txs.map(t=>t.id)) + 1 : 1;
  txs.push({id, type, category, description:desc, amount, date});
  saveTxs(txs);

  if (isRecurring) {
    const day = new Date(date+'T12:00:00').getDate();
    const recurring = getRecurring();
    const rid = 'r_' + Date.now();
    recurring.push({id:rid, type, category, description:desc, amount, day});
    saveRecurring(recurring);
  }

  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-recurring').checked = false;
  populateMonthFilter();
  refresh();
  toast('Transação adicionada!');

  // Also save to backend
  fetch(`${API}/transactions`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type, category, description: desc, amount, date})
  });
}

async function delTx(id) {
  confirmDel('Apagar esta transação?', async () => {
    saveTxs(getTxs().filter(t=>t.id!==id));
    refresh();
    toast('Transação apagada','info');
    fetch(`${API}/transactions/${id}`, {method:'DELETE'});
  });
}

function editTx(id) {
  const t = getTxs().find(x=>x.id===id);
  if (!t) return;
  document.getElementById('e-id').value = t.id;
  // reset type options
  const sel = document.getElementById('e-type');
  sel.innerHTML = '';
  for (const tp of Object.keys(cats)) {
    const o = document.createElement('option');
    o.value = tp; o.textContent = tp==='receita'?'Receita':'Despesa';
    sel.appendChild(o);
  }
  sel.value = t.type;
  updateEditCat();
  document.getElementById('e-cat').value = t.category;
  document.getElementById('e-desc').value = t.description;
  document.getElementById('e-amount').value = fmtInput(String(t.amount));
  document.getElementById('e-date').value = t.date;
  document.getElementById('edit-modal').classList.add('open');
}

function fmtInput(amount) {
  const n = (parseFloat(amount) * 100).toFixed(0);
  let digits = String(n);
  while (digits.length < 3) digits = '0' + digits;
  return 'R$ ' + Number(digits.slice(0,-2)).toLocaleString('pt-BR') + ',' + digits.slice(-2);
}

async function saveTx() {
  const id = document.getElementById('e-id').value;
  const body = {};
  body.category = document.getElementById('e-cat').value;
  body.description = document.getElementById('e-desc').value;
  body.amount = parseMoney(document.getElementById('e-amount').value);
  body.date = document.getElementById('e-date').value;
  body.type = document.getElementById('e-type').value;

  // update local
  const txs = getTxs();
  const t = txs.find(x=>x.id===parseInt(id));
  if (t) Object.assign(t, body);
  saveTxs(txs);

  closeModal();
  refresh();
  toast('Transação atualizada!');

  fetch(`${API}/transactions/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
}

function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

// Tabs
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.t).classList.add('active');
  });
});

/* ---- budgets ---- */
function renderBudgets(txs) {
  const container = document.getElementById('budgets-grid');
  if (!container) return;
  const budgets = getBudgets();
  const keys = Object.keys(budgets);
  if (!keys.length) {
    container.innerHTML = '<p class="empty" style="font-size:0.85rem">Nenhum orçamento definido.</p>';
    return;
  }
  const expenseTx = txs.filter(t=>t.type==='expense');
  const byCat = {};
  for (const t of expenseTx) byCat[t.category] = (byCat[t.category]||0) + t.amount;
  container.innerHTML = '';
  for (const [cat, limit] of Object.entries(budgets)) {
    const spent = byCat[cat] || 0;
    const pct = Math.min(100, Math.round((spent / Math.max(limit,1)) * 100));
    const color = pct > 90 ? '#ef4444' : pct > 70 ? '#f59e0b' : '#22c55e';
    const ic = cats.expense?.icons?.[cat] || '';
    container.innerHTML += `
      <div class="budget-card">
        <div class="budget-info">
          <div class="budget-label">${ic} ${cat}</div>
          <div class="budget-bar-bg"><div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="budget-amount">${fmt(spent)} / ${fmt(limit)}</div>
        </div>
        <button class="btn-del" onclick="delBudget('${cat}')" title="Remover">✕</button>
      </div>`;
  }
}

function showBudgetForm() {
  const f = document.getElementById('budget-form');
  f.style.display = f.style.display === 'none' ? 'flex' : 'none';
}

function addBudget() {
  const cat = document.getElementById('budget-cat').value;
  const amount = parseFloat(document.getElementById('budget-amount-input').value);
  if (!amount || amount <= 0) return toast('Valor inválido','error');
  const budgets = getBudgets();
  budgets[cat] = amount;
  saveBudgets(budgets);
  document.getElementById('budget-amount-input').value = '';
  document.getElementById('budget-form').style.display = 'none';
  refresh();
  toast('Orçamento definido!');
}

function delBudget(cat) {
  confirmDel('Remover orçamento de '+cat+'?', () => {
    const budgets = getBudgets();
    delete budgets[cat];
    saveBudgets(budgets);
    refresh();
    toast('Orçamento removido','info');
  });
}

/* ---- recurring ---- */
function showRecurring() {
  const container = document.getElementById('recurring-grid');
  if (!container) return;
  const recurring = getRecurring();
  if (!recurring.length) {
    container.innerHTML = '<p class="empty" style="font-size:0.85rem">Nenhuma transação recorrente.</p>';
    return;
  }
  container.innerHTML = '';
  for (const r of recurring) {
    const ic = cats[r.type]?.icons?.[r.category] || '';
    container.innerHTML += `
      <div class="recurring-item">
        <div class="recurring-item-info">${ic} ${r.description} — ${fmt(r.amount)} (dia ${r.day})</div>
        <button class="btn-del" onclick="delRecurring('${r.id}')" title="Remover">✕</button>
      </div>`;
  }
}

function delRecurring(id) {
  confirmDel('Remover recorrente?', () => {
    saveRecurring(getRecurring().filter(r=>r.id!==id));
    showRecurring();
    toast('Recorrente removido','info');
  });
}

// Month filter change
document.getElementById('month-sel').addEventListener('change', () => { refresh(); });

// Init default date
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);

// CSV
async function exportCSV() {
  const txs = getTxs();
  let csv = 'tipo,categoria,descricao,valor,data\n';
  for (const t of txs) csv += `${t.type},${t.category},"${t.description.replace(/"/g,'""')}",${t.amount},${t.date}\n`;
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'finance_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('CSV exportado!');
}

async function importCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const text = await file.text();
  try {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return toast('CSV vazio','error');
    const header = lines[0].trim().toLowerCase();
    let count = 0;
    const txs = getTxs();
    let maxId = txs.length ? Math.max(...txs.map(t=>t.id)) : 0;
    for (let i = 1; i < lines.length; i++) {
      const parts = lines[i].split(',');
      if (parts.length < 5) continue;
      const [type,category,...rest] = parts;
      const date = parts[parts.length-1].trim();
      const amount = parts[parts.length-2].trim();
      const description = rest.slice(0,-1).join(',').trim();
      if (!type||!category||!description||!amount||!date) continue;
      maxId++;
      txs.push({id:maxId, type:type.trim(), category:category.trim(), description:description.replace(/^"|"$/g,'').replace(/""/g,'"'), amount:parseFloat(parseFloat(amount)), date});
      count++;
    }
    saveTxs(txs);
    refresh();
    populateMonthFilter();
    toast(`${count} transações importadas!`);
  } catch { toast('Erro ao ler CSV','error'); }
  e.target.value = '';
}

load();
</script>
</body>
</html>
