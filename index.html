<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>&#128179; Finance</h1>

  <div class="top-actions">
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="exportCSV()">&#128200; Exportar CSV</button>
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="document.getElementById('csv-file').click()">&#128200; Importar CSV</button>
    <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(event)">
  </div>

  <div class="month-filter">
    &nbsp;&#128197;&nbsp; <select id="month-sel"><option value="all">Todos</option></select>
  </div>

  <div class="balance">
    <div class="card"><small>Receitas</small><div class="value val-green" id="income">R$ 0,00</div></div>
    <div class="card"><small>Despesas</small><div class="value val-red" id="expense">R$ 0,00</div></div>
    <div class="card"><small>Saldo</small><div class="value val-white" id="balance">R$ 0,00</div></div>
  </div>

  <div class="form-row" id="add-form">
    <label>Tipo <select id="f-type" onchange="updateCat()"></select></label>
    <label>Categoria <select id="f-cat"></select></label>
    <label>Descri&ccedil;&atilde;o <input id="f-desc" placeholder="ex: Sal&aacute;rio"></label>
    <label>Valor (R$) <input id="f-amount" inputmode="numeric" class="money-input" placeholder="0,00"></label>
    <label>Data <input id="f-date" type="date"></label>
    <label class="checkbox-label"><input type="checkbox" id="f-recurring"> Recorrente (mensal)</label>
    <button class="btn btn-add" onclick="addTx()">Adicionar</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-t="overview">Vis&atilde;o Geral</button>
    <button class="tab" data-t="analysis">An&aacute;lise</button>
    <button class="tab" data-t="budgets">Or&ccedil;amentos</button>
  </div>

  <div class="tab-content active" id="tab-overview">
    <div class="chart-section"><h2>Por categoria</h2><div class="bar-wrap" id="cat-chart"></div></div>
    <div class="chart-section" style="margin-top:16px"><h2>Por m&ecirc;s</h2><div class="bar-wrap" id="month-chart"></div></div>
    <div class="chart-section" style="margin-top:20px">
      <h2>Transa&ccedil;&otilde;es</h2>
      <div class="table-wrap"><table><thead><tr><th>Tipo</th><th>Cat</th><th>Descri&ccedil;&atilde;o</th><th>Valor</th><th>Data</th><th></th></tr></thead><tbody id="tx-list"></tbody></table></div>
    </div>
  </div>

  <div class="tab-content" id="tab-analysis">
    <div id="analysis-grid">
      <div class="donut-wrap"><div id="donut-chart" style="position:relative"></div></div>
      <div class="donut-wrap"><div id="donut-receita" style="position:relative"></div></div>
      <div class="analysis-card" id="comparison-section"></div>
      <div class="analysis-card" id="trend-section"></div>
      <div class="analysis-card" id="monthly-summary"></div>
      <div class="analysis-card" id="cat-breakdown"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-budgets">
    <div class="budget-section">
      <h2>Or&ccedil;amentos mensais</h2>
      <div class="budget-input-row" id="budget-form" style="display:none">
        <select id="budget-cat"></select>
        <input id="budget-amount-input" type="number" step="0.01" min="0" placeholder="Limite R$">
        <button class="btn-add-budget" onclick="addBudget()">Definir</button>
      </div>
      <button class="btn-budget" onclick="showBudgetForm()" style="margin-bottom:12px">+ Novo or&ccedil;amento</button>
      <div id="budgets-grid"></div>
    </div>
    <div class="budget-section">
      <h2>Transa&ccedil;&otilde;es recorrentes</h2>
      <div id="recurring-grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Editar Transa&ccedil;&atilde;o</h3>
    <input type="hidden" id="e-id">
    <label>Tipo <select id="e-type" onchange="updateEditCat()"></select></label>
    <label>Categoria <select id="e-cat"></select></label>
    <label>Descri&ccedil;&atilde;o <input id="e-desc"></label>
    <label>Valor (R$) <input id="e-amount" inputmode="numeric" class="money-input"></label>
    <label>Data <input id="e-date" type="date"></label>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveTx()">Salvar</button>
    </div>
  </div>
</div>

<div class="confirm-modal-overlay" id="confirm-ov" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="confirm-modal">
    <h3>Confirmar</h3>
    <p id="confirm-msg">Tem certeza?</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" id="confirm-no">Cancelar</button>
      <button class="btn-confirm-del" id="confirm-yes">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast-c" class="toast-container"></div>

<script>
const API = '';
let cats = {};

const EXPENSE_COLORS = ['#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#06b6c4','#6366f1','#a855f7'];
const REVENUE_COLORS = ['#22c55e','#10b981','#059669','#34d399'];

function getAllCatNames() {
  const result = {};
  for (const [type, cfg] of Object.entries(cats)) {
    for (const [key, name] of Object.entries(cfg.icons || {})) result[key] = name;
  }
  return result;
}

const fmt = v => parseFloat(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const iconFor = (type, cat) => { for(const[k,v] of Object.entries(cats[type]?.icons||{})) { if(k===cat) return v; } return ''; };

function getTxs() { return JSON.parse(localStorage.getItem('finance_txs')||'[]'); }
function saveTxs(txs) { localStorage.setItem('finance_txs', JSON.stringify(txs)); }
function getRecurring() { return JSON.parse(localStorage.getItem('finance_recurring')||'[]'); }
function saveRecurring(r) { localStorage.setItem('finance_recurring', JSON.stringify(r)); }
function getBudgets() { return JSON.parse(localStorage.getItem('finance_budgets')||'{}'); }
function saveBudgets(b) { localStorage.setItem('finance_budgets', JSON.stringify(b)); }

function setupMoneyInput(el) {
  el.addEventListener('input', () => {
    let digits = el.value.replace(/\D/g, '');
    if (!digits) { el.value = ''; return; }
    while (digits.length < 3) digits = '0' + digits;
    const cents = digits.slice(-2);
    const intPart = digits.slice(0, -2);
    el.value = 'R$ ' + Number(intPart).toLocaleString('pt-BR') + ',' + cents;
  });
}
function parseMoney(raw) {
  if (!raw) return NaN;
  const digits = raw.replace(/\D/g, '');
  if (digits.length < 3) return digits === '' ? NaN : parseInt(digits) / 100;
  return parseInt(digits) / 100;
}

function toast(msg, type='success') {
  let c = document.getElementById('toast-c');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function confirmDel(msg, onYes) {
  const ev = document.getElementById('confirm-ov');
  document.getElementById('confirm-msg').textContent = msg;
  ev.classList.add('open');
  document.getElementById('confirm-yes').onclick = () => { ev.classList.remove('open'); onYes(); };
  document.getElementById('confirm-no').onclick = () => { ev.classList.remove('open'); };
}

function syncRecurring() {
  if (Object.keys(cats).length === 0) return;
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  const txs = getTxs();
  const existingKeys = new Set(txs.filter(t=>t.recurringId).map(t=>t.recurringId+'-'+t.date.slice(0,7)));
  const recurring = getRecurring();
  let changed = false;
  for (const rec of recurring) {
    const key = rec.id + '-' + ym;
    if (!existingKeys.has(key)) {
      const day = Math.min(rec.day || 1, 28);
      const date = ym + '-' + String(day).padStart(2,'0');
      const maxId = txs.length ? Math.max(...txs.map(t=>t.id)) : 0;
      txs.push({id:maxId+1, type:rec.type, category:rec.category, description:rec.description, amount:rec.amount, date, recurringId:rec.id});
      changed = true;
    }
  }
  if (changed) saveTxs(txs);
}

function populateMonthFilter() {
  const sel = document.getElementById('month-sel');
  const txs = getTxs();
  const months = new Set();
  for (const t of txs) months.add(t.date.slice(0,7));
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  months.add(ym);
  sel.innerHTML = '';
  const all = document.createElement('option');
  all.value = 'all'; all.textContent = 'Todos';
  sel.appendChild(all);
  const sorted = [...months].sort().reverse();
  for (const m of sorted) {
    const [y,mo] = m.split('-');
    const d = new Date(y, mo-1);
    const o = document.createElement('option');
    o.value = m;
    o.textContent = d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    if (m === ym) o.selected = true;
    sel.appendChild(o);
  }
}

async function load() {
  syncRecurring();
  const r = await fetch(`${API}/api/categories`);
  const j = await r.json();
  cats = j.data;

  for (const t of Object.keys(cats)) {
    const sel = document.getElementById('f-type');
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t === 'receita' ? 'Receita' : 'Despesa';
    if (t === 'expense') opt.selected = true;
    sel.appendChild(opt);
  }

  const eType = document.getElementById('e-type');
  eType.innerHTML = '';
  for (const type of Object.keys(cats)) {
    const o = document.createElement('option');
    o.value = type; o.textContent = type === 'receita' ? 'Receita' : 'Despesa';
    eType.appendChild(o);
  }

  updateCat();
  setupMoneyInput(document.getElementById('f-amount'));
  setupMoneyInput(document.getElementById('e-amount'));

  const bSel = document.getElementById('budget-cat');
  bSel.innerHTML = '';
  for (const [k,v] of Object.entries(cats.expense?.icons||{})) {
    const o = document.createElement('option'); o.value = k; o.textContent = v;
    bSel.appendChild(o);
  }

  populateMonthFilter();
  refresh();
}

function updateCat() {
  const t = document.getElementById('f-type').value;
  const sel = document.getElementById('f-cat');
  sel.innerHTML = '';
  for (const c of Object.keys(cats[t]?.icons||{})) {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    sel.appendChild(o);
  }
}

function updateEditCat() {
  const t = document.getElementById('e-type').value;
  const sel = document.getElementById('e-cat');
  sel.innerHTML = '';
  if (!cats[t]) return;
  for (const c of Object.keys(cats[t].icons)) {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    sel.appendChild(o);
  }
}

function refresh() {
  syncRecurring();
  const allTxs = getTxs();
  allTxs.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);

  const ineAll = allTxs.filter(t=>t.type==='receita').reduce((s,t)=>s+t.amount,0);
  const expAll = allTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('income').textContent = fmt(ineAll);
  document.getElementById('expense').textContent = fmt(expAll);
  document.getElementById('balance').textContent = fmt(ineAll-expAll);

  const mSel = document.getElementById('month-sel');
  const month = mSel.value;
  let txs = month !== 'all' ? allTxs.filter(t=>t.date && t.date.startsWith(month)) : allTxs;

  const tb = document.getElementById('tx-list');
  tb.innerHTML = '';
  if (!txs.length) { tb.innerHTML='<tr><td colspan="6"><div class="empty">Nenhuma transação</div></td></tr>'; }
  for (const t of txs) {
    const tr = document.createElement('tr');
    const label = t.type === 'receita' ? 'Receita' : 'Despesa';
    const pill = t.type === 'receita' ? 'pill-receita' : 'pill-expense';
    const recTag = t.recurringId ? '<span class="recurring-tag">recorrente</span>' : '';
    tr.innerHTML = '<td><span class="pill '+pill+'">'+label+'</span>'+recTag+'</td>' +
      '<td>'+(cats[t.type]?.icons?.[t.category]||'')+' '+t.category+'</td>' +
      '<td>'+t.description+'</td>' +
      '<td>'+fmt(t.amount)+'</td>' +
      '<td>'+new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR')+'</td>' +
      '<td><button class="btn btn-del" onclick="editTx('+t.id+')">&#9998;</button><button class="btn btn-del" onclick="delTx('+t.id+')">&#10005;</button></td>';
    tb.appendChild(tr);
  }

  const byC={};
  for (const t of txs){ const k=t.type+'|'+t.category; byC[k]=(byC[k]||0)+t.amount; }
  const maxC = Math.max(1,...Object.values(byC));
  const cc = document.getElementById('cat-chart');
  cc.innerHTML = '';
  for (const [k,v] of Object.entries(byC).sort((a,b)=>b[1]-a[1])) {
    const [type,cat]=k.split('|');
    const ic=cats[type]?.icons?.[cat]||'';
    cc.innerHTML+='<div class="bar-row"><span>'+ic+' '+cat+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+(v/maxC*100)+'%;background:'+(type==='receita'?'#4ade80':'#f87171')+'"></div></div><div class="bar-amount">'+fmt(v)+'</div></div>';
  }

  const byM={};
  for (const t of allTxs){ const m=t.date.slice(0,7); const k=m+'|'+(t.type==='receita'?'💚':'❤️'); byM[k]=(byM[k]||0)+t.amount; }
  const maxM = Math.max(1,...Object.values(byM));
  const mc = document.getElementById('month-chart');
  mc.innerHTML = '';
  for (const [k,v] of Object.entries(byM)) {
    const [mon,tag]=k.split('|');
    mc.innerHTML+='<div class="bar-row"><span>'+mon+' '+tag+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+(v/maxM*100)+'%;background:'+(tag==='💚'?'#4ade80':'#f87171')+'"></div></div><div class="bar-amount">'+fmt(v)+'</div></div>';
  }

  renderBudgets(txs);
  showRecurring();
  renderAnalysis(allTxs, month);
}

async function addTx() {
  const type = document.getElementById('f-type').value;
  const category = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseMoney(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  const isRecurring = document.getElementById('f-recurring').checked;
  if (!desc||!amount||!date) return toast('Preencha todos os campos','error');
  if (amount<=0) return toast('Valor deve ser maior que zero','error');

  const txs = getTxs();
  const id = txs.length ? Math.max(...txs.map(t=>t.id))+1 : 1;
  txs.push({id,type,category,description:desc,amount,date});
  saveTxs(txs);

  if (isRecurring) {
    const day = new Date(date+'T12:00:00').getDate();
    const recurring = getRecurring();
    const rid = 'r_' + Date.now();
    recurring.push({id:rid,type,category,description:desc,amount,day});
    saveRecurring(recurring);
  }

  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-recurring').checked = false;
  populateMonthFilter();
  refresh();
  toast('Transação adicionada!');

  fetch(`${API}/transactions`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type,category,description:desc,amount,date})
  });
}

async function delTx(id) {
  confirmDel('Apagar esta transação?', async () => {
    saveTxs(getTxs().filter(t=>t.id!==id));
    refresh();
    toast('Transação apagada','info');
    fetch(`${API}/transactions/${id}`, {method:'DELETE'});
  });
}

function editTx(id) {
  const t = getTxs().find(x=>x.id===id);
  if (!t) return;
  document.getElementById('e-id').value = t.id;
  const sel = document.getElementById('e-type');
  sel.innerHTML = '';
  for (const tp of Object.keys(cats)) {
    const o = document.createElement('option');
    o.value = tp; o.textContent = tp==='receita'?'Receita':'Despesa';
    sel.appendChild(o);
  }
  sel.value = t.type;
  updateEditCat();
  document.getElementById('e-cat').value = t.category;
  document.getElementById('e-desc').value = t.description;
  const raw = String(t.amount * 100);
  let digits = raw.split('.')[0];
  while (digits.length < 3) digits = '0' + digits;
  document.getElementById('e-amount').value = 'R$ ' + Number(digits.slice(0,-2)).toLocaleString('pt-BR') + ',' + digits.slice(-2);
  document.getElementById('e-date').value = t.date;
  document.getElementById('edit-modal').classList.add('open');
}

async function saveTx() {
  const id = document.getElementById('e-id').value;
  const body = {};
  body.category = document.getElementById('e-cat').value;
  body.description = document.getElementById('e-desc').value;
  body.amount = parseMoney(document.getElementById('e-amount').value);
  body.date = document.getElementById('e-date').value;
  body.type = document.getElementById('e-type').value;

  const txs = getTxs();
  const t = txs.find(x=>x.id===parseInt(id));
  if (t) Object.assign(t, body);
  saveTxs(txs);

  closeModal();
  refresh();
  toast('Transação atualizada!');

  fetch(`${API}/transactions/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
}

function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.t === 'analysis') {
      renderAnalysis(getTxs(), document.getElementById('month-sel').value);
    }
    document.getElementById('tab-' + btn.dataset.t).classList.add('active');
  });
});

/* ---- Analysis ---- */
function renderAnalysis(allTxs, monthFilter) {
  const grid = document.getElementById('analysis-grid');
  if (!grid) return;
  if (!allTxs.length) {
    grid.innerHTML = '<p class="empty" style="font-size:0.85rem">Sem dados para análise.</p>';
    return;
  }

  const now = monthFilter !== 'all' ? monthFilter : new Date().toISOString().slice(0,7);
  const curTxs = allTxs.filter(t=>t.date && t.date.startsWith(now));
  const prev = getPrevMonth(now);
  const prevTxs = allTxs.filter(t=>t.date && t.date.startsWith(prev));

  // Donut expenses
  const curExp = curTxs.filter(t=>t.type==='expense');
  const byCatExp = {};
  for (const t of curExp) byCatExp[t.category] = (byCatExp[t.category]||0) + t.amount;
  document.getElementById('donut-chart').innerHTML = renderDonut(byCatExp, EXPENSE_COLORS, 'expense');

  // Donut revenue
  const curInc = curTxs.filter(t=>t.type==='receita');
  const byCatInc = {};
  for (const t of curInc) byCatInc[t.category] = (byCatInc[t.category]||0) + t.amount;
  document.getElementById('donut-receita').innerHTML = renderDonut(byCatInc, REVENUE_COLORS, 'receita');

  document.getElementById('comparison-section').innerHTML = renderComparison(byCatExp, prevTxs, now);
  document.getElementById('trend-section').innerHTML = renderBalanceTrend(allTxs);
  document.getElementById('monthly-summary').innerHTML = renderMonthlySummary(curTxs, now);
  catBreakdownTable(byCatExp);
}

function getPrevMonth(ym) {
  const [y,m] = ym.split('-');
  const d = new Date(parseInt(y), parseInt(m) - 2);
  return d.toISOString().slice(0,7);
}

function renderDonut(data, colors, type) {
  const entries = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,v])=>s+v,0);
  if (!total) return '<p class="empty" style="font-size:0.85rem">Sem transações neste período</p>';

  const r = 55, cx = 70, cy = 70;
  const circ = 2 * Math.PI * r;
  let seg = '', legend = '', offset = 0;
  for (const [cat, amount] of entries) {
    const pct = amount / total;
    const dashLen = pct * circ;
    const dashOff = -offset * circ;
    const ic = iconFor(type, cat);
    const col = colors[entries.indexOf([cat,amount]) % colors.length];
    seg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="18" stroke-dasharray="'+dashLen+' '+(circ-dashLen)+'" stroke-dashoffset="'+dashOff+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    offset += pct;
    const name = getAllCatNames()[cat] || cat;
    legend += '<span class="donut-legend-item"><span class="dot" style="background:'+col+'"></span>'+ic+' '+name+' '+Math.round(pct*100)+'%</span>';
  }

  const title = type === 'expense' ? 'Despesas do mês' : 'Receitas do mês';
  return '<p style="font-size:0.7rem;color:#64748b;text-align:center;margin-bottom:6px">'+title+'</p>' +
    '<svg viewBox="0 0 140 140" class="donut-svg">'+seg+'</svg>' +
    '<div class="donut-center"><div style="font-size:0.7rem;color:#94a3b8">Total</div><div style="font-weight:700;font-size:1rem">'+fmt(total)+'</div></div>' +
    '<div class="donut-legend">'+legend+'</div>';
}

function renderComparison(curByCat, prevTxs, monthStr) {
  const prevByCat = {};
  for (const t of prevTxs.filter(t=>t.type==='expense')) prevByCat[t.category] = (prevByCat[t.category]||0) + t.amount;
  const allCats = new Set([...Object.keys(curByCat),...Object.keys(prevByCat)]);
  if (!allCats.size) return '<h3>Comparação mensal</h3><p class="empty" style="font-size:0.85rem">Sem dados</p>';

  const label = new Date(monthStr+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  let html = '<h3>Comparação mensal</h3><p style="font-size:0.7rem;color:#64748b;margin-bottom:8px">'+label+' vs mês anterior</p>';
  for (const cat of allCats) {
    const cur = curByCat[cat]||0;
    const prev = prevByCat[cat]||0;
    if (!cur && !prev) continue;
    const diff = prev > 0 ? ((cur-prev)/prev*100) : (cur>0?100:0);
    const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '=';
    const color = diff > 0 ? '#ef4444' : diff < 0 ? '#22c55e' : '#94a3b8';
    const ic = iconFor('expense', cat);
    const name = getAllCatNames()[cat] || cat;
    html += '<div class="comparison-row"><span>'+ic+' '+name+'</span><span style="color:'+color+';font-weight:600">'+arrow+' '+Math.abs(Math.round(diff))+'%</span><span style="font-size:0.7rem;color:#94a3b8">'+fmt(prev)+' → '+fmt(cur)+'</span></div>';
  }
  return html;
}

function renderBalanceTrend(allTxs) {
  const months = {};
  for (const t of allTxs) {
    const m = t.date.slice(0,7);
    if (!months[m]) months[m] = {income:0, expense:0};
    if (t.type==='receita') months[m].income += t.amount;
    else months[m].expense += t.amount;
  }
  const sorted = Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0]));
  let cumulative = 0;
  const points = sorted.map(([month, data]) => { cumulative += data.income - data.expense; return {month, balance:cumulative}; });
  if (!points.length) return '<h3>Tendência de saldo</h3><p class="empty" style="font-size:0.85rem">Sem dados</p>';

  const absMax = Math.max(1,...points.map(p=>Math.abs(p.balance)));
  const w = 280, h = 100, pad = 8;
  const stepX = points.length > 1 ? (w-pad*2)/(points.length-1) : 0;

  let pathD='', dots='', labels='';
  points.forEach((p,i) => {
    const x = pad + i*stepX;
    const mid = (h-pad*2)/2;
    const y = (h-pad) - (p.balance/absMax*mid + mid);
    pathD += (i===0?'M'+x+','+y:' L'+x+','+y);
    dots += '<circle cx="'+x+'" cy="'+y+'" r="2.5" fill="'+(p.balance>=0?'#4ade80':'#f87171')+'"/>';
    if (i===0 || i===points.length-1) {
      const [yy,mm] = p.month.split('-');
      const d = new Date(parseInt(yy),parseInt(mm)-1);
      labels += '<text x="'+x+'" y="'+(h-1)+'" fill="#64748b" font-size="6" text-anchor="middle">'+d.toLocaleDateString('pt-BR',{month:'short'})+'</text>';
    }
  });

  const lastBal = points[points.length-1].balance;
  const color = lastBal >= 0 ? '#4ade80' : '#f87171';
  const lastPt = points[points.length-1];
  const mid = (h-pad*2)/2;
  const labelY = (h-pad) - (lastPt.balance/absMax*mid + mid) - 6;
  const labelX = points.length > 1 ? pad + (points.length-1)*stepX : pad;

  return '<h3>Tendência de saldo</h3>' +
    '<p style="font-size:0.75rem;color:'+color+';margin-bottom:8px">'+(lastBal>=0?'↑':'↓')+' '+fmt(lastBal)+' acumulado</p>' +
    '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="overflow:visible">' +
    '<line x1="'+pad+'" y1="'+(h-pad-mid)+'" x2="'+(w-pad)+'" y2="'+(h-pad-mid)+'" stroke="#334155" stroke-dasharray="2,3"/>' +
    '<path d="'+pathD+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
    dots +
    '<text x="'+labelX+'" y="'+labelY+'" fill="'+color+'" font-size="6" font-weight="600">'+fmt(lastBal)+'</text>' +
    labels +
    '</svg>';
}

function renderMonthlySummary(txs, monthStr) {
  const ine = txs.filter(t=>t.type==='receita').reduce((s,t)=>s+t.amount,0);
  const exp = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal = ine - exp;
  const label = new Date(monthStr+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  const byCat = {};
  for (const t of txs.filter(t=>t.type==='expense')) byCat[t.category] = (byCat[t.category]||0) + t.amount;
  const topCat = Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  let topHtml = '';
  if (topCat && topCat[1]>0) {
    const pct = Math.round(topCat[1]/Math.max(1,exp)*100);
    const ic = iconFor('expense', topCat[0]);
    const name = getAllCatNames()[topCat[0]]||topCat[0];
    topHtml = 'Maior gasto: '+ic+' '+name+' ('+pct+'%)';
  }

  return '<h3>Resumo do mês</h3>' +
    '<p style="font-size:0.8rem;color:#94a3b8;line-height:1.6">'+label+':</p>' +
    '<p style="font-size:0.82rem;line-height:1.7">' +
    'Receita: <span style="color:#4ade80;font-weight:600">'+fmt(ine)+'</span><br>' +
    'Despesas: <span style="color:#f87171;font-weight:600">'+fmt(exp)+'</span><br>' +
    'Sobra: <span style="color:'+(bal>=0?'#4ade80':'#f87171')+';font-weight:600">'+fmt(bal)+'</span><br>' +
    (topHtml ? topHtml+'<br>' : '') +
    'Transações: '+txs.length +
    '</p>';
}

function catBreakdownTable(byCat) {
  const container = document.getElementById('cat-breakdown');
  if (!container) return;
  const total = Object.values(byCat).reduce((s,v)=>s+v,0);
  if (!total) { container.innerHTML = '<p class="empty" style="font-size:0.85rem">Sem transações</p>'; return; }
  const sorted = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  let html = '<table><thead><tr><th style="padding:6px 8px">Categoria</th><th style="padding:6px 8px">Valor</th><th style="padding:6px 8px">%</th></tr></thead><tbody>';
  for (const [cat,amount] of sorted) {
    const pct = Math.round(amount/total*100);
    const ic = iconFor('expense', cat);
    const name = getAllCatNames()[cat] || cat;
    html += '<tr><td style="padding:8px;font-size:0.82rem">'+ic+' '+name+'</td><td style="padding:8px;font-size:0.82rem">'+fmt(amount)+'</td><td style="padding:8px;font-size:0.82rem">'+pct+'%</td></tr>';
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

/* ---- Budgets ---- */
function renderBudgets(txs) {
  const container = document.getElementById('budgets-grid');
  if (!container) return;
  const budgets = getBudgets();
  const keys = Object.keys(budgets);
  if (!keys.length) { container.innerHTML = '<p class="empty" style="font-size:0.85rem">Nenhum orçamento definido.</p>'; return; }
  const byCat = {};
  for (const t of txs.filter(t=>t.type==='expense')) byCat[t.category] = (byCat[t.category]||0) + t.amount;
  container.innerHTML = '';
  for (const [cat,limit] of Object.entries(budgets)) {
    const spent = byCat[cat]||0;
    const pct = Math.min(100, Math.round(spent/Math.max(limit,1)*100));
    const color = pct>90 ? '#ef4444' : pct>70 ? '#f59e0b' : '#22c55e';
    const ic = cats.expense?.icons?.[cat]||'';
    container.innerHTML += '<div class="budget-card"><div class="budget-info"><div class="budget-label">'+ic+' '+cat+'</div><div class="budget-bar-bg"><div class="budget-bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div><div class="budget-amount">'+fmt(spent)+' / '+fmt(limit)+'</div></div><button class="btn btn-del" onclick="delBudget(\'' + cat + '\')">&#10005;</button></div>';
  }
}

function showBudgetForm() {
  const f = document.getElementById('budget-form');
  f.style.display = f.style.display === 'none' ? 'flex' : 'none';
}

function addBudget() {
  const cat = document.getElementById('budget-cat').value;
  const amount = parseFloat(document.getElementById('budget-amount-input').value);
  if (!amount||amount<=0) return toast('Valor inválido','error');
  const budgets = getBudgets();
  budgets[cat] = amount;
  saveBudgets(budgets);
  document.getElementById('budget-amount-input').value = '';
  document.getElementById('budget-form').style.display = 'none';
  refresh();
  toast('Orçamento definido!');
}

function delBudget(cat) {
  confirmDel('Remover orçamento de '+cat+'?', () => {
    const budgets = getBudgets();
    delete budgets[cat];
    saveBudgets(budgets);
    refresh();
    toast('Orçamento removido','info');
  });
}

function showRecurring() {
  const container = document.getElementById('recurring-grid');
  if (!container) return;
  const recurring = getRecurring();
  if (!recurring.length) { container.innerHTML = '<p class="empty" style="font-size:0.85rem">Nenhuma transação recorrente.</p>'; return; }
  container.innerHTML = '';
  for (const r of recurring) {
    const ic = cats[r.type]?.icons?.[r.category]||'';
    container.innerHTML += '<div class="recurring-item"><div class="recurring-item-info">'+ic+' '+r.description+' — '+fmt(r.amount)+' (dia '+r.day+')</div><button class="btn btn-del" onclick="delRecurring(\'' + r.id + '\')">&#10005;</button></div>';
  }
}

function delRecurring(id) {
  confirmDel('Remover recorrente?', () => {
    saveRecurring(getRecurring().filter(r=>r.id!==id));
    showRecurring();
    toast('Recorrente removido','info');
  });
}

document.getElementById('month-sel').addEventListener('change', () => { refresh(); });
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);

async function exportCSV() {
  const txs = getTxs();
  let csv = 'tipo,categoria,descricao,valor,data\n';
  for (const t of txs) csv += t.type+','+t.category+',"'+t.description.replace(/"/g,'""')+'",'+t.amount+','+t.date+'\n';
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'finance_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exportado!');
}

async function importCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const text = await file.text();
  try {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return toast('CSV vazio','error');
    const header = lines[0].trim().toLowerCase();
    let count = 0;
    const txs = getTxs();
    let maxId = txs.length ? Math.max(...txs.map(t=>t.id)) : 0;
    for (let i=1;i<lines.length;i++) {
      const parts = lines[i].split(',');
      if (parts.length < 5) continue;
      const [type,category,...rest] = parts;
      const date = parts[parts.length-1].trim();
      const amount = parts[parts.length-2].trim();
      const description = rest.slice(0,-1).join(',').trim();
      if (!type||!category||!description||!amount||!date) continue;
      maxId++;
      txs.push({id:maxId,type:type.trim(),category:category.trim(),description:description.replace(/^"|"$/g,'').replace(/""/g,'"'),amount:parseFloat(parseFloat(amount)),date});
      count++;
    }
    saveTxs(txs); refresh(); populateMonthFilter();
    toast(count+' transações importadas!');
  } catch { toast('Erro ao ler CSV','error'); }
  e.target.value = '';
}

load();
