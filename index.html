<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 24px; }

  /* Balance */
  .balance { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px; }
  .card small { color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
  .card .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
  .val-green { color: #4ade80; }
  .val-red { color: #f87171; }
  .val-white { color: #e2e8f0; }

  /* Form */
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; background: #1e293b; padding: 16px; border-radius: 12px; align-items: flex-end; }
  .form-row label { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; font-size: 0.8rem; color: #94a3b8; }
  .form-row input, .form-row select, .form-row textarea { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 0.9rem; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #6366f1; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
  .btn-add { background: #6366f1; color: white; }
  .btn-add:hover { background: #4f46e5; }
  .btn-del { background: transparent; color: #94a3b8; font-size: 1.1rem; padding: 2px 6px; }
  .btn-del:hover { color: #f87171; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; }
  td { padding: 12px; border-bottom: 1px solid #1e293b66; font-size: 0.9rem; }
  tr:hover td { background: #1e293b55; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 0.8rem; }
  .pill-receita { background: #14532d22; color: #4ade80; }
  .pill-expense { background: #7f1d1d22; color: #f87171; }

  /* Chart */
  .chart-section { margin-top: 28px; }
  .chart-section h2 { font-size: 1.1rem; margin-bottom: 12px; }
  .bar-wrap { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-row span:first-child { width: 120px; font-size: 0.85rem; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-bg { flex: 1; background: #1e293b; border-radius: 6px; height: 26px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
  .bar-amount { font-size: 0.85rem; font-weight: 600; width: 80px; text-align: right; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #1e293b44; padding: 4px; border-radius: 10px; width: fit-content; }
  .tab { padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: #94a3b8; border: none; background: transparent; font-weight: 500; }
  .tab.active { background: #6366f1; color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Edit modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1e293b; border-radius: 14px; padding: 24px; width: 360px; max-width: 90vw; }
  .modal h3 { margin-bottom: 14px; }
  .modal label { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; font-size: 0.8rem; color: #94a3b8; }
  .modal input, .modal select, .modal textarea { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 0.9rem; }
  .modal-btns { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
  .btn-save { background: #22c55e; color: #fff; }
  .btn-cancel { background: #334155; color: #e2e8f0; }

  @media (max-width: 600px) { .balance { grid-template-columns: 1fr; } .form-row { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">
  <h1>💳 Finance</h1>

  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="exportCSV()">Exportar CSV</button>
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="document.getElementById('csv-file').click()">Importar CSV</button>
    <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(event)">
  </div>

  <div class="tabs">
    <button class="tab active" data-t="overview">Visão Geral</button>
    <button class="tab" data-t="categories">Categorias</button>
  </div>

  <!-- VISAO GERAL -->
  <div class="tab-content active" id="tab-overview">
    <div class="balance">
      <div class="card"><small>Receitas</small><div class="value val-green" id="income">R$ 0,00</div></div>
      <div class="card"><small>Despesas</small><div class="value val-red" id="expense">R$ 0,00</div></div>
      <div class="card"><small>Saldo</small><div class="value val-white" id="balance">R$ 0,00</div></div>
    </div>

    <div class="form-row" id="add-form">
      <label>Tipo
        <select id="f-type" onchange="updateCat()"></select>
      </label>
      <label>Categoria <select id="f-cat"></select></label>
      <label>Descrição <input id="f-desc" placeholder="ex: Salário"></label>
      <label>Valor (R$) <input id="f-amount" type="number" step="0.01" min="0"></label>
      <label>Data <input id="f-date" type="date"></label>
      <button class="btn btn-add" onclick="addTx()">Adicionar</button>
    </div>

    <!-- Chart -->
    <div class="chart-section"><h2>Por categoria</h2><div class="bar-wrap" id="cat-chart"></div></div>
    <div class="chart-section" style="margin-top:16px"><h2>Por mês</h2><div class="bar-wrap" id="month-chart"></div></div>

    <div class="chart-section" style="margin-top:20px">
      <h2>Transações</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Tipo</th><th>Cat</th><th>Descrição</th><th>Valor</th><th>Data</th><th></th></tr></thead>
          <tbody id="tx-list"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- CATEGORIES TAB -->
  <div class="tab-content" id="tab-categories">
    <div id="cats-grid"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Editar Transação</h3>
    <input type="hidden" id="e-id">
    <label>Tipo <select id="e-type" onchange="updateEditCat()"></select></label>
    <label>Categoria <select id="e-cat"></select></label>
    <label>Descrição <input id="e-desc"></label>
    <label>Valor (R$) <input id="e-amount" type="number" step="0.01" min="0"></label>
    <label>Data <input id="e-date" type="date"></label>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveTx()">Salvar</button>
    </div>
  </div>
</div>

<script>
const API = '';
let cats = {};

const fmt = v => parseFloat(v).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

async function api(url) {
  const r = await fetch(`${API}${url}`);
  const j = await r.json();
  return j.data;
}

async function load() {
  cats = await api('/categories');
  for (const t of Object.keys(cats)) {
    const sel = document.getElementById('f-type');
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t === 'receita' ? 'Receita' : 'Despesa';
    if (t === 'expense') opt.selected = true;
    sel.appendChild(opt);
  }
  updateCat();
  await refresh();
}

function updateCat() {
  const t = document.getElementById('f-type').value;
  const sel = document.getElementById('f-cat');
  sel.innerHTML = '';
  for (const c of Object.keys(cats[t]?.icons || {})) {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  }
}

function updateEditCat() {
  const t = document.getElementById('e-type').value;
  const sel = document.getElementById('e-cat');
  sel.innerHTML = '';
  if (!cats[t]) return;
  for (const c of Object.keys(cats[t].icons)) {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  }
}

async function refresh() {
  const txs = await api('/transactions');
  const sum = await api('/summary');

  document.getElementById('income').textContent = fmt(sum.total_income);
  document.getElementById('expense').textContent = fmt(sum.total_expense);
  document.getElementById('balance').textContent = fmt(sum.balance);

  // table
  const tb = document.getElementById('tx-list');
  tb.innerHTML = '';
  for (const t of txs) {
    const tr = document.createElement('tr');
    const label = t.type === 'receita' ? 'Receita' : 'Despesa';
    const pill = t.type === 'receita' ? 'pill-receita' : 'pill-expense';
    tr.innerHTML = `
      <td><span class="pill ${pill}">${label}</span></td>
      <td>${cats[t.type]?.icons?.[t.category] || ''} ${t.category}</td>
      <td>${t.description}</td>
      <td>${fmt(t.amount)}</td>
      <td>${new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR')}</td>
      <td><button class="btn btn-del" onclick="editTx(${t.id})">✏</button><button class="btn btn-del" onclick="delTx(${t.id})">✕</button></td>
    `;
    tb.appendChild(tr);
  }

  // cat chart
  const maxC = Math.max(1, ...sum.by_category.map(c => c.total));
  const cc = document.getElementById('cat-chart');
  cc.innerHTML = '';
  for (const c of sum.by_category) {
    const ic = cats[c.type]?.icons?.[c.category] || '';
    cc.innerHTML += `<div class="bar-row"><span>${ic} ${c.category}</span><div class="bar-bg"><div class="bar-fill" style="width:${(c.total/maxC)*100}%;background:${cats[c.type]?.color||'#888'}"></div></div><div class="bar-amount">${fmt(c.total)}</div></div>`;
  }

  // month chart
  const maxM = Math.max(1, ...sum.by_month.map(c => c.total));
  const mc = document.getElementById('month-chart');
  mc.innerHTML = '';
  for (const m of sum.by_month) {
    const tag = m.type === 'receita' ? '💚' : '❤️';
    mc.innerHTML += `<div class="bar-row"><span>${m.month} ${tag}</span><div class="bar-bg"><div class="bar-fill" style="width:${(m.total/maxM)*100}%;background:${m.type==='receita'?'#4ade80':'#f87171'}"></div></div><div class="bar-amount">${fmt(m.total)}</div></div>`;
  }
}

async function addTx() {
  const type = document.getElementById('f-type').value;
  const category = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  if (!desc || !amount || !date) return alert('Preencha todos os campos');
  await fetch(`${API}/transactions`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type, category, description: desc, amount, date})
  });
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  await refresh();
}

async function delTx(id) {
  if (!confirm('Apagar?')) return;
  await fetch(`${API}/transactions/${id}`, {method:'DELETE'});
  await refresh();
}

function editTx(id) {
  fetch(`${API}/transactions`).then(r=>r.json()).then(j=>{
    const t = j.data.find(x=>x.id===id);
    if (!t) return;
    document.getElementById('e-id').value = t.id;
    // reset type options
    const sel = document.getElementById('e-type');
    sel.innerHTML = '';
    for (const tp of Object.keys(cats)) {
      const o = document.createElement('option');
      o.value = tp; o.textContent = tp==='receita'?'Receita':'Despesa';
      sel.appendChild(o);
    }
    sel.value = t.type;
    updateEditCat();
    document.getElementById('e-cat').value = t.category;
    document.getElementById('e-desc').value = t.description;
    document.getElementById('e-amount').value = t.amount;
    document.getElementById('e-date').value = t.date;
    document.getElementById('edit-modal').classList.add('open');
  });
}

async function saveTx() {
  const id = document.getElementById('e-id').value;
  const body = {};
  body.category = document.getElementById('e-cat').value;
  body.description = document.getElementById('e-desc').value;
  body.amount = parseFloat(document.getElementById('e-amount').value);
  body.date = document.getElementById('e-date').value;
  await fetch(`${API}/transactions/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  closeModal();
  await refresh();
}

function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

// Tabs
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.t).classList.add('active');
    if (btn.dataset.t === 'categories') showCatsTab();
  });
});

function showCatsTab() {
  const g = document.getElementById('cats-grid');
  g.innerHTML = '';
  for (const [type, c] of Object.entries(cats)) {
    const label = type === 'receita' ? 'Receitas' : 'Despesas';
    let html = `<div style="margin-bottom:20px"><h3 style="margin-bottom:8px">${label}</h3>`;
    html += c.icons ? Object.entries(c.icons).map(([ic, em]) => `<div style="font-size:1rem;padding:4px 0">${em} ${ic}</div>`).join('') : '';
    html += '</div>';
    g.innerHTML += html;
  }
}

// Init default date
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);

// CSV
async function exportCSV() {
  const r = await fetch(`${API}/api/export-csv`);
  const blob = await r.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'finance_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

async function importCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const body = new FormData();
  body.append('file', file);
  const r = await fetch(`${API}/api/import-csv`, {
    method: 'POST', headers: {'Content-Type': 'text/csv'},
    body: file
  });
  const j = await r.json();
  alert(`${j.data.imported} transações importadas!`);
  await refresh();
  e.target.value = '';
}

load();
</script>
</body>
</html>
