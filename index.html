<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>&#128179; Finance</h1>

  <div class="top-actions">
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="exportCSV()">&#128200; Exportar CSV</button>
    <button class="btn btn-add" style="background:#1e293b;border:1px solid #334155" onclick="document.getElementById('csv-file').click()">&#128200; Importar CSV</button>
    <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(event)">
  </div>

  <div class="month-filter">
    &nbsp;&#128197;&nbsp; <select id="month-sel"><option value="all">Todos</option></select>
  </div>

  <div class="balance">
    <div class="card"><small>Receitas</small><div class="value val-green" id="v-ine">R$ 0,00</div></div>
    <div class="card"><small>Despesas</small><div class="value val-red" id="v-exp">R$ 0,00</div></div>
    <div class="card"><small>Saldo</small><div class="value val-white" id="v-bal">R$ 0,00</div></div>
  </div>

  <div class="form-row" id="add-form">
    <label>Tipo <select id="f-type" onchange="fillCats('f')"><option value="receita">Receita</option><option value="expense">Despesa</option></select></label>
    <label>Categoria <select id="f-cat"></select></label>
    <label>Descri&ccedil;&atilde;o <input id="f-desc" placeholder="ex: Sal&aacute;rio"></label>
    <label>Valor (R$&nbsp;)<input id="f-amount" inputmode="numeric" class="money-input" placeholder="0,00"></label>
    <label>Data <input id="f-date" type="date"></label>
    <label class="checkbox-label"><input type="checkbox" id="f-recurring"> Recorrente</label>
    <button class="btn btn-add" onclick="addTx()">Adicionar</button>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-t="overview" role="tab">Vis&atilde;o Geral</button>
    <button class="tab" data-t="analysis" role="tab">An&aacute;lise</button>
    <button class="tab" data-t="budgets" role="tab">Or&ccedil;amentos</button>
    <button class="tab" data-t="settings" role="tab">Config.</button>
  </div>

  <div class="tab-content active" id="tab-overview" role="tabpanel">
    <div class="chart-section"><h2>Por categoria</h2><div class="bar-wrap" id="ch-cat"></div></div>
    <div class="chart-section" style="margin-top:16px"><h2>Por m&ecirc;s</h2><div class="bar-wrap" id="ch-mth"></div></div>
    <div class="chart-section" style="margin-top:20px">
      <h2>Transa&ccedil;&otilde;es</h2>
      <div class="table-wrap"><table><thead><tr><th>Tipo</th><th>Categoria</th><th>Descri&ccedil;&atilde;o</th><th>Valor</th><th>Data</th><th></th></tr></thead><tbody id="tx-list"></tbody></table></div>
    </div>
  </div>

  <div class="tab-content" id="tab-analysis" role="tabpanel">
    <div id="analysis-grid">
      <div class="donut-wrap"><div id="donut-chart" style="position:relative"></div></div>
      <div class="donut-wrap"><div id="donut-receita" style="position:relative"></div></div>
      <div class="analysis-card" id="comparison-section"></div>
      <div class="analysis-card" id="trend-section"></div>
      <div class="analysis-card" id="monthly-summary"></div>
      <div class="analysis-card" id="cat-breakdown"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-budgets" role="tabpanel">
    <div class="budget-section">
      <h2>Or&ccedil;amentos mensais</h2>
      <div class="budget-input-row" id="budget-form" style="display:none">
        <select id="budget-cat"></select>
        <input id="budget-amount-input" type="number" step="0.01" min="0" placeholder="Limite R$">
        <button class="btn-add-budget" onclick="addBudget()">Definir</button>
      </div>
      <button class="btn-budget" onclick="showBudgetForm()" style="margin-bottom:12px">+ Novo or&ccedil;amento</button>
      <div id="budgets-grid"></div>
    </div>
    <div class="budget-section">
      <h2>Transa&ccedil;&otilde;es recorrentes</h2>
      <div id="recurring-grid"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-settings" role="tabpanel">
    <div class="settings">
      <button onclick="exportData()">&#128190; Exportar dados (JSON)</button>
      <button onclick="document.getElementById('imp-file').click()">&#128193; Importar dados (JSON)</button>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
      <button onclick="exportCSV()">&#128200; Exportar CSV</button>
      <button onclick="document.getElementById('csv-file').click()">&#128200; Importar Extrato (CSV)</button>
      <input type="file" id="csv-file" accept=".csv,.json,*/*" style="display:none" onchange="importCSV(event)">
      <button class="danger" id="clear-btn">Limpar tudo</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Editar Transa&ccedil;&atilde;o</h3>
    <input type="hidden" id="e-id">
    <label>Tipo <select id="e-type" onchange="fillCats('e')"><option value="receita">Receita</option><option value="expense">Despesa</option></select></label>
    <label>Categoria <select id="e-cat"></select></label>
    <label>Descri&ccedil;&atilde;o <input id="e-desc"></label>
    <label>Valor (R$&nbsp;)<input id="e-amt" inputmode="numeric" class="money-input"></label>
    <label>Data <input id="e-date" type="date"></label>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeM()">Cancelar</button>
      <button class="btn-save" onclick="saveTx()">Salvar</button>
    </div>
  </div>
</div>

<div class="confirm-modal-overlay" id="confirm-ov" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="confirm-modal">
    <h3>Confirmar</h3>
    <p id="confirm-msg">Tem certeza?</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" id="confirm-no">Cancelar</button>
      <button class="btn-confirm-del" id="confirm-yes">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast-c" class="toast-container"></div>

<script>
/* ============================================================
   Finance App — Desktop web version
   ============================================================ */

const CATS = {
  receita: { color:'#22c55e', icons:{Salary:'Salário',Investments:'Investimentos',Freelance:'Freelance',Other:'Outro'} },
  expense: { color:'#ef4444', icons:{Food:'Alimentação',Transport:'Transporte',Housing:'Moradia',Health:'Saúde',Entertainment:'Lazer',Shopping:'Compras',Education:'Educação',Other:'Outro'} }
};
const CAT_NAMES = {};
for (const [,cfg] of Object.entries(CATS)) { for (const [k,v] of Object.entries(cfg.icons)) { CAT_NAMES[k] = v; } }

const EXPENSE_COLORS = ['#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#06b6d4','#6366f1','#a855f7'];
const REVENUE_COLORS = ['#22c55e','#10b981','#059669','#34d399'];

/* ---- persistence ---- */
function getTxs()    { return JSON.parse(localStorage.getItem('finance_txs') || '[]'); }
function saveTxs(txs){ localStorage.setItem('finance_txs', JSON.stringify(txs)); }
function getRecurring()   { return JSON.parse(localStorage.getItem('finance_recurring') || '[]'); }
function saveRecurring(r) { localStorage.setItem('finance_recurring', JSON.stringify(r)); }
function getBudgets()     { return JSON.parse(localStorage.getItem('finance_budgets') || '{}'); }
function saveBudgets(b)   { localStorage.setItem('finance_budgets', JSON.stringify(b)); }

/* ---- util ---- */
const fmt = v => parseFloat(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const iconFor = (type,cat) => { for(const[k,v]of Object.entries(CATS[type]?.icons||{})){if(k===cat)return v;} return ''; };
const esc = s => { if(typeof s!=='string') return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'); };
const safeRound = n => Math.round(n * 100) / 100;

/* ---- currency mask ---- */
function moneyInput(el){
  el.addEventListener('input',()=>{
    let d=el.value.replace(/\D/g,''); if(!d){el.value='';return;}
    while(d.length<3) d='0'+d;
    el.value='R$ '+Number(d.slice(0,-2)).toLocaleString('pt-BR')+','+d.slice(-2);
  });
}
function parseMoney(raw){ const d=raw?.replace(/\D/g,'')??''; if(!d) return NaN; return parseInt(d,10)/100; }
function fmtInput(raw){
  let d=raw.replace(/\D/g,''); if(!d) return '';
  while(d.length<3) d='0'+d;
  return 'R$ '+Number(d.slice(0,-2)).toLocaleString('pt-BR')+','+d.slice(-2);
}

/* ---- toasts ---- */
function toast(msg,type='success'){
  let c=document.getElementById('toast-c');
  const t=document.createElement('div'); t.className='toast toast-'+type; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

/* ---- confirm ---- */
function confirmDel(msg,onYes){
  const ev=document.getElementById('confirm-ov');
  document.getElementById('confirm-msg').textContent=msg; ev.classList.add('open');
  document.getElementById('confirm-yes').onclick=()=>{ev.classList.remove('open');onYes();};
  document.getElementById('confirm-no').onclick=()=>ev.classList.remove('open');
}

/* ---- recurring sync ---- */
function syncRecurring(){
  const now=new Date(), ym=now.toISOString().slice(0,7);
  const txs=getTxs();
  const kSet=new Set(txs.filter(t=>t.recurringId).map(t=>t.recurringId+'-'+t.date.slice(0,7)));
  const rec=getRecurring(); let ch=false;
  for(const r of rec){
    if(!kSet.has(r.id+'-'+ym)){
      const day=Math.min(r.day||1,28);
      const maxId=txs.length?Math.max(...txs.map(t=>t.id)):0;
      txs.push({id:maxId+1,type:r.type,category:r.category,description:r.description,amount:safeRound(r.amount),date:`${ym}-${String(day).padStart(2,'0')}`,recurringId:r.id});
      ch=true;
    }
  }
  if(ch) saveTxs(txs);
}

/* ---- month filter ---- */
function populateMonthFilter(){
  const sel=document.getElementById('month-sel');
  const txs=getTxs(); const months=new Set();
  for(const t of txs) if(t.date) months.add(t.date.slice(0,7));
  const ym=new Date().toISOString().slice(0,7); months.add(ym);
  sel.innerHTML='';
  const all=document.createElement('option'); all.value='all'; all.textContent='Todos'; sel.appendChild(all);
  for(const m of [...months].sort().reverse()){
    const[y,mo]=m.split('-'); const d=new Date(parseInt(y),parseInt(mo)-1);
    const o=document.createElement('option'); o.value=m; o.textContent=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    if(m===ym) o.selected=true; sel.appendChild(o);
  }
}

/* ---- init ---- */
function load(){
  syncRecurring(); fillCats('f');
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  moneyInput(document.getElementById('f-amount')); moneyInput(document.getElementById('e-amt'));
  const eType=document.getElementById('e-type'); eType.innerHTML='';
  for(const t of Object.keys(CATS)){const o=document.createElement('option');o.value=t;o.textContent=t==='receita'?'Receita':'Despesa';eType.appendChild(o);}
  const bSel=document.getElementById('budget-cat');
  if(bSel){bSel.innerHTML='';for(const[k,v]of Object.entries(CATS.expense?.icons||{})){const o=document.createElement('option');o.value=k;o.textContent=v;bSel.appendChild(o);}}
  populateMonthFilter(); refresh();
}

async function refresh(){
  syncRecurring();
  const allTxs=getTxs(); allTxs.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  const ine=safeRound(allTxs.filter(t=>t.type==='receita').reduce((s,t)=>s+Number(t.amount),0));
  const exp=safeRound(allTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0));
  document.getElementById('v-ine').textContent=fmt(ine);
  document.getElementById('v-exp').textContent=fmt(exp);
  document.getElementById('v-bal').textContent=fmt(ine-exp);
  const mSel=document.getElementById('month-sel'); const month=mSel.value;
  const txs=month!=='all'?allTxs.filter(t=>t.date&&t.date.startsWith(month)):allTxs;
  renderTable(txs); renderDetailCharts(txs,month);
  renderBudgets(txs); renderAnalysis(allTxs,month);
}

function fillCats(pre){
  const t=document.getElementById(pre==='f'?'f-type':'e-type').value;
  const sel=document.getElementById(pre==='f'?'f-cat':'e-cat'); sel.innerHTML='';
  for(const[k,v]of Object.entries(CATS[t]||CATS[t]?.icons||{})){const o=document.createElement('option');o.value=k;o.textContent=v;sel.appendChild(o);}
}

/* ---- table ---- */
function renderTable(txs){
  const tb=document.getElementById('tx-list');
  if(!txs.length){tb.innerHTML='<tr><td colspan="6"><div class="empty">Nenhuma transa&ccedil;&atilde;o</div></td></tr>';return;}
  tb.innerHTML='';
  for(const t of txs){
    const tr=document.createElement('tr');
    const lbl=t.type==='receita'?'Receita':'Despesa';
    const p=t.type==='receita'?'pill-receita':'pill-expense';
    const ic=esc(iconFor(t.type,t.category));
    const cat=esc(String(t.category));
    const desc=esc(String(t.description));
    const ds=t.date?new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR'):'';
    const recTag=t.recurringId?'<span class="recurring-tag">recorrente</span>':'';
    tr.innerHTML=`<td><span class="pill ${p}">${lbl}</span>${recTag}</td><td>${ic} ${cat}</td><td>${desc}</td><td>${fmt(t.amount)}</td><td>${ds}</td><td><button class="btn btn-del" onclick="editTx(${t.id})">\u270f</button><button class="btn btn-del" onclick="delTx(${t.id})">\u2715</button></td>`;
    tb.appendChild(tr);
  }
}

/* ---- charts ---- */
function renderDetailCharts(txs,month){
  const cc=document.getElementById('ch-cat');
  if(!cc) return;
  const byC={}; for(const t of txs){const k=t.type+'|'+t.category;byC[k]=safeRound((byC[k]||0)+t.amount);}
  const mc=Math.max(1,...Object.values(byC));
  const entries=Object.entries(byC).sort((a,b)=>b[1]-a[1]);
  cc.innerHTML=entries.length?entries.map(([k,v])=>{
    const[type,cat]=k.split('|'); const ic=esc(iconFor(type,cat));
    return`<div class="bar-row"><span>${ic} ${esc(cat)}</span><div class="bar-bg"><div class="bar-fill" style="width:${v/mc*100}%;background:${type==='receita'?'#4ade80':'#f87171'}"></div></div><div class="bar-amount">${fmt(v)}</div></div>`;
  }).join(''):'<div class="empty">Sem dados</div>';

  const allTxs=getTxs();
  const byM={}; for(const t of allTxs){const m=t.date?.slice(0,7);if(!m)continue;const tag=t.type==='receita'?'💚':'❤️';const k=m+'|'+tag;byM[k]=safeRound((byM[k]||0)+t.amount);}
  const chm=document.getElementById('ch-mth'); if(!chm)return;
  const mm=Math.max(1,...Object.values(byM));
  const mEntries=Object.entries(byM).sort((a,b)=>a[0].localeCompare(b[0]));
  chm.innerHTML=mEntries.length?mEntries.map(([k,v])=>{
    const[mon,tag]=k.split('|'); return`<div class="bar-row"><span>${mon} ${tag}</span><div class="bar-bg"><div class="bar-fill" style="width:${v/mm*100}%;background:${tag==='💚'?'#4ade80':'#f87171'}"></div></div><div class="bar-amount">${fmt(v)}</div></div>`;
  }).join(''):'<div class="empty">Sem dados</div>';
}

/* ---- analysis ---- */
function renderAnalysis(allTxs,monthFilter){
  const g=document.getElementById('analysis-grid'); if(!g)return;
  if(!allTxs.length){g.innerHTML='<p class="empty" style="font-size:0.85rem">Sem dados.</p>';return;}
  const now=monthFilter!=='all'?monthFilter:new Date().toISOString().slice(0,7);
  const cur=allTxs.filter(t=>t.date&&t.date.startsWith(now));
  const prev=getPrevMonth(now);
  const prevTxs=allTxs.filter(t=>t.date&&t.date.startsWith(prev));
  const byCat={}; for(const t of cur.filter(t=>t.type==='expense')) byCat[t.category]=safeRound((byCat[t.category]||0)+t.amount);
  const donut=document.getElementById('donut-chart'); if(donut) donut.innerHTML=renderDonut(byCat,EXPENSE_COLORS,'expense');
  const byInc={}; for(const t of cur.filter(t=>t.type==='receita')) byInc[t.category]=safeRound((byInc[t.category]||0)+t.amount);
  const donutInc=document.getElementById('donut-receita'); if(donutInc) donutInc.innerHTML=renderDonut(byInc,REVENUE_COLORS,'receita');
  const comp=document.getElementById('comparison-section'); if(comp) comp.innerHTML=renderComparison(byCat,prevTxs,now);
  const trend=document.getElementById('trend-section'); if(trend) trend.innerHTML=renderBalanceTrend(allTxs);
  const summary=document.getElementById('monthly-summary'); if(summary) summary.innerHTML=renderMonthlySummary(cur,now);
  catBreakdownTable(byCat);
}
function getPrevMonth(ym){const[y,m]=ym.split('-');return new Date(parseInt(y,10),parseInt(m,10)-2).toISOString().slice(0,7);}

function renderDonut(data,colors,type='expense'){
  const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  if(!total) return'<p class="empty" style="font-size:0.85rem">Sem transa&ccedil;&otilde;es no per&iacute;odo</p>';
  const r=55,cx=70,cy=70,circ=2*Math.PI*r;
  let seg='',leg='',off=0;
  for(let i=0;i<entries.length;i++){
    const[cat,amt]=entries[i]; const pct=amt/total;
    seg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="18" stroke-dasharray="${pct*circ} ${circ-pct*circ}" stroke-dashoffset="${-off*circ}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=pct;
  }
  for(let i=0;i<entries.length;i++){
    const[cat]=entries[i]; const pct=Math.round(entries[i][1]/total*100);
    leg+=`<span class="donut-legend-item"><span class="dot" style="background:${colors[i%colors.length]}"></span>${esc(iconFor(type,cat))} ${esc(CAT_NAMES[cat]||cat)} ${pct}%</span>`;
  }
  return`<p style="font-size:0.7rem;color:#64748b;text-align:center;margin-bottom:6px">${type==='expense'?'Despesas do m\u00eas':'Receitas do m\u00eas'}</p>
    <svg viewBox="0 0 140 140" class="donut-svg">${seg}</svg>
    <div class="donut-center"><div style="font-size:0.7rem;color:#94a3b8">Total</div><div style="font-weight:700;font-size:1rem">${fmt(total)}</div></div>
    <div class="donut-legend">${leg}</div>`;
}

function renderComparison(curByCat,prevTxs,monthStr){
  const prevByCat={}; for(const t of prevTxs.filter(t=>t.type==='expense')) prevByCat[t.category]=safeRound((prevByCat[t.category]||0)+t.amount);
  const allCats=new Set([...Object.keys(curByCat),...Object.keys(prevByCat)]);
  if(!allCats.size) return '<p class="empty" style="font-size:0.85rem">Sem dados</p>';
  const label=new Date(monthStr+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  let h=`<h3>Compara\u00e7\u00e3o mensal</h3><p style="font-size:0.7rem;color:#64748b;margin-bottom:8px">${esc(label)} vs m\u00eas anterior</p>`;
  for(const cat of allCats){
    const c=curByCat[cat]||0,p=prevByCat[cat]||0; if(!c&&!p) continue;
    const diff=p>0?((c-p)/p*100):(c>0?100:0);
    const a=diff>0?'\u2191':diff<0?'\u2193':'=';
    const col=diff>0?'#ef4444':diff<0?'#22c55e':'#94a3b8';
    h+=`<div class="comparison-row"><span>${esc(iconFor('expense',cat))} ${esc(CAT_NAMES[cat]||cat)}</span><span style="color:${col};font-weight:600">${a} ${Math.abs(Math.round(diff))}%</span><span style="font-size:0.7rem;color:#94a3b8">${fmt(p)} \u2192 ${fmt(c)}</span></div>`;
  }
  return h;
}

function renderBalanceTrend(allTxs){
  const ms={};
  for(const t of allTxs){const m=t.date?.slice(0,7);if(!m)continue;if(!ms[m])ms[m]={i:0,e:0};if(t.type==='receita')ms[m].i+=t.amount;else ms[m].e+=t.amount;}
  const sorted=Object.entries(ms).sort((a,b)=>a[0].localeCompare(b[0]));
  let cum=0;const pts=sorted.map(([mo,d])=>{cum=safeRound(cum+d.i-d.e);return{month:mo,balance:cum};});
  if(!pts.length) return'<h3>Tend\u00eancia de saldo</h3><p class="empty">Sem dados</p>';
  const absMax=Math.max(1,...pts.map(p=>Math.abs(p.balance)));
  const w=280,hh=100,pad=8;const sX=pts.length>1?(w-pad*2)/(pts.length-1):0;
  let path='',dots='',labels='';
  pts.forEach((p,i)=>{
    const x=pad+i*sX;const mid=(hh-pad*2)/2;const y=(hh-pad)-(p.balance/absMax*mid+mid);
    path+=(i===0?`M${x},${y}`:` L${x},${y}`);
    dots+=`<circle cx="${x}" cy="${y}" r="2.5" fill="${p.balance>=0?'#4ade80':'#f87171'}"/>`;
    if(i===0||i===pts.length-1){const[y2,mm]=p.month.split('-');labels+=`<text x="${x}" y="${hh-1}" fill="#64748b" font-size="6" text-anchor="middle">${new Date(parseInt(y2),parseInt(mm)-1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})}</text>`;}
  });
  const last=pts[pts.length-1];const col=last.balance>=0?'#4ade80':'#f87171';
  const mid=(hh-pad*2)/2;const lY=(hh-pad)-(last.balance/absMax*mid+mid)-6;const lX=pts.length>1?pad+(pts.length-1)*sX:pad;
  return`<h3>Tend\u00eancia de saldo</h3><p style="font-size:0.75rem;color:${col};margin-bottom:8px">${last.balance>=0?'\u2191':'\u2193'} ${fmt(safeRound(last.balance))} acumulado</p>
    <svg viewBox="0 0 ${w} ${hh}" width="100%" style="overflow:visible"><line x1="${pad}" y1="${hh-pad-mid}" x2="${w-pad}" y2="${hh-pad-mid}" stroke="#334155" stroke-dasharray="2,3"/><path d="${path}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots}<text x="${lX}" y="${lY}" fill="${col}" font-size="6" font-weight="600">${fmt(safeRound(last.balance))}</text>${labels}</svg>`;
}

function renderMonthlySummary(txs,monthStr){
  const inc=safeRound(txs.filter(t=>t.type==='receita').reduce((s,t)=>s+Number(t.amount),0));
  const exp=safeRound(txs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0));
  const bal=safeRound(inc-exp);
  const label=new Date(monthStr+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const byCat={};for(const t of txs.filter(t=>t.type==='expense')) byCat[t.category]=safeRound((byCat[t.category]||0)+t.amount);
  const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  let topH='';
  if(top&&top[1]>0){const pct=Math.round(top[1]/Math.max(1,exp)*100);topH=`Maior gasto: ${esc(iconFor('expense',top[0]))} ${esc(CAT_NAMES[top[0]]||top[0])} (${pct}%)`;}
  return`<h3>Resumo do m\u00eas</h3><p style="font-size:0.8rem;color:#94a3b8;line-height:1.6">${esc(label)}:</p>
    <p style="font-size:0.82rem;line-height:1.7">Receita: <span style="color:#4ade80;font-weight:600">${fmt(inc)}</span><br>
    Despesas: <span style="color:#f87171;font-weight:600">${fmt(exp)}</span><br>
    Sobra: <span style="color:${bal>=0?'#4ade80':'#f87171'};font-weight:600">${fmt(bal)}</span>${topH?'<br>'+topH:''}<br>
    Transa\u00e7\u00f5es: ${txs.length}</p>`;
}

function catBreakdownTable(byCat){
  const c=document.getElementById('cat-breakdown'); if(!c)return;
  const total=Object.values(byCat).reduce((s,v)=>s+v,0);
  if(!total){c.innerHTML='<p class="empty">Sem transa\u00e7\u00f5es</p>';return;}
  c.innerHTML='<table><thead><tr><th style="padding:6px 8px">Categoria</th><th style="padding:6px 8px">Valor</th><th style="padding:6px 8px">%</th></tr></thead><tbody>'+
    Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
      const pct=Math.round(amt/total*100);
      return`<tr><td style="padding:8px;font-size:0.82rem">${esc(iconFor('expense',cat))} ${esc(CAT_NAMES[cat]||cat)}</td><td style="padding:8px;font-size:0.82rem">${fmt(safeRound(amt))}</td><td style="padding:8px;font-size:0.82rem">${pct}%</td></tr>`;
    }).join('')+'</tbody></table>';
}

/* ---- add ---- */
async function addTx(){
  const type=document.getElementById('f-type').value;
  const category=document.getElementById('f-cat').value;
  const description=document.getElementById('f-desc').value.trim();
  const amount=parseMoney(document.getElementById('f-amount').value);
  const date=document.getElementById('f-date').value;
  const isRec=document.getElementById('f-recurring').checked;
  if(!description||!amount||!date) return toast('Preencha todos os campos','error');
  if(isNaN(amount)||amount<=0) return toast('Valor deve ser maior que zero','error');
  const txs=getTxs(); const id=txs.length?Math.max(...txs.map(t=>t.id))+1:1;
  txs.push({id,type,category,description,amount:safeRound(amount),date}); saveTxs(txs);
  if(isRec){
    const day=new Date(date+'T12:00:00').getDate(); const rec=getRecurring(); const rid='r_'+Date.now();
    rec.push({id:rid,type,category,description,amount:safeRound(amount),day}); saveRecurring(rec);
  }
  document.getElementById('f-desc').value=''; document.getElementById('f-amount').value=''; document.getElementById('f-recurring').checked=false;
  populateMonthFilter(); await refresh(); toast('Transa\u00e7\u00e3o adicionada!');
}

/* ---- delete ---- */
function delTx(id){ confirmDel('Apagar esta transa\u00e7\u00e3o?',()=>{saveTxs(getTxs().filter(t=>t.id!==id));refresh();toast('Transa\u00e7\u00e3o apagada','info');}); }

/* ---- edit ---- */
function editTx(id){
  const t=getTxs().find(x=>x.id===id); if(!t) return;
  document.getElementById('e-id').value=t.id; fillCats('e');
  document.getElementById('e-type').value=t.type; fillCats('e');
  document.getElementById('e-cat').value=t.category;
  document.getElementById('e-desc').value=t.description;
  document.getElementById('e-amt').value=fmtInput(String(Math.round(t.amount*100)));
  document.getElementById('e-date').value=t.date;
  document.getElementById('edit-modal').classList.add('open');
}

function saveTx(){
  const id=parseInt(document.getElementById('e-id').value,10);
  const amount=parseMoney(document.getElementById('e-amt').value);
  if(isNaN(amount)||amount<=0) return toast('Valor inv\u00e1lido','error');
  const txs=getTxs(); const t=txs.find(x=>x.id===id); if(!t) return;
  t.category=document.getElementById('e-cat').value; t.description=document.getElementById('e-desc').value;
  t.amount=safeRound(amount); t.date=document.getElementById('e-date').value; t.type=document.getElementById('e-type').value;
  saveTxs(txs); closeM(); refresh(); toast('Transa\u00e7\u00e3o atualizada!');
}
function closeM(){ document.getElementById('edit-modal').classList.remove('open'); }

/* ---- budgets ---- */
function renderBudgets(txs){
  const c=document.getElementById('budgets-grid'); if(!c)return;
  const budgets=getBudgets(); const keys=Object.keys(budgets);
  if(!keys.length){c.innerHTML='<p class="empty">Nenhum or\u00e7amento definido.</p>';return;}
  const byCat={};for(const t of txs.filter(t=>t.type==='expense')) byCat[t.category]=safeRound((byCat[t.category]||0)+t.amount);
  c.innerHTML='';
  for(const[cat,lim] of Object.entries(budgets)){
    const spent=byCat[cat]||0; const pct=Math.min(100,Math.round((spent/Math.max(lim,1))*100));
    const col=pct>90?'#ef4444':pct>70?'#f59e0b':'#22c55e';
    c.innerHTML+=`<div class="budget-card"><div class="budget-info"><div class="budget-label">${esc(iconFor('expense',cat))} ${esc(CAT_NAMES[cat]||cat)}</div><div class="budget-bar-bg"><div class="budget-bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="budget-amount">${fmt(spent)} / ${fmt(lim)}</div></div><button class="btn btn-del" onclick="delBudget('${esc(cat)}')">\u2715</button></div>`;
  }
}
function showBudgetForm(){const f=document.getElementById('budget-form');f.style.display=f.style.display==='none'?'flex':'none';}
function addBudget(){
  const cat=document.getElementById('budget-cat').value; const amount=parseFloat(document.getElementById('budget-amount-input').value);
  if(!amount||amount<=0) return toast('Valor inv\u00e1lido','error');
  const budgets=getBudgets(); budgets[cat]=amount; saveBudgets(budgets);
  document.getElementById('budget-amount-input').value=''; document.getElementById('budget-form').style.display='none';
  refresh(); toast('Or\u00e7amento definido!');
}
function delBudget(cat){confirmDel('Remover or\u00e7amento de '+cat+'?',()=>{const b=getBudgets();delete b[cat];saveBudgets(b);refresh();toast('Or\u00e7amento removido','info');});}

/* ---- recurring ---- */
function showRecurring(){
  const c=document.getElementById('recurring-grid'); if(!c)return;
  const rec=getRecurring();
  if(!rec.length){c.innerHTML='<p class="empty">Nenhuma transa\u00e7\u00e3o recorrente.</p>';return;}
  c.innerHTML='';
  for(const r of rec) c.innerHTML+=`<div class="recurring-item"><div class="recurring-item-info">${esc(iconFor(r.type,r.category))} ${esc(String(r.description))} \u2014 ${fmt(r.amount)} (dia ${r.day})</div><button class="btn btn-del" onclick="delRecurring('${esc(r.id)}')">\u2715</button></div>`;
}
function delRecurring(id){confirmDel('Remover recorrente?',()=>{saveRecurring(getRecurring().filter(r=>r.id!==id));showRecurring();toast('Recorrente removido','info');});}

/* ---- tabs ---- */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.t).classList.add('active');
    if(btn.dataset.t==='analysis') renderAnalysis(getTxs(),document.getElementById('month-sel').value);
    if(btn.dataset.t==='budgets'){renderBudgets(getTxs());showRecurring();}
  });
});

/* ---- export/import ---- */
function exportData(){
  const d={transactions:getTxs(),recurring:getRecurring(),budgets:getBudgets()};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finance_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('Dados exportados!');
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  f.text().then(t=>{
    try{
      const d=JSON.parse(t);
      if(Array.isArray(d.transactions)) saveTxs(d.transactions);
      if(Array.isArray(d.recurring)) saveRecurring(d.recurring);
      if(d.budgets&&typeof d.budgets==='object') saveBudgets(d.budgets);
      refresh();populateMonthFilter();toast('Importado!');
    }catch{toast('Erro ao ler arquivo','error');}
    e.target.value='';
  });
}

function parseCSVLine(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(q){if(ch==='"'&&line[i+1]==='"'){c+='"';i++;}else if(ch==='"'){q=false;}else{c+=ch;}}
    else{if(ch==='"'){q=true;}else if(ch===','){r.push(c);c='';}else{c+=ch;}}
  }
  r.push(c);return r;
}

function exportCSV(){
  const txs=getTxs(); let csv='tipo,categoria,descricao,valor,data\n';
  for(const t of txs) csv+=`${t.type},${t.category},"${t.description.replace(/"/g,'""')}",${t.amount},${t.date}\n`;
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='finance_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('CSV exportado!');
}

function importCSV(e){
  const f=e.target.files[0];if(!f)return;
  f.text().then(txt=>{
    try{
      const lines=txt.trim().split('\n');
      if(lines.length<2) return toast('CSV vazio','error');
      const header=lines[0].trim().toLowerCase();
      let count=0;const txs=getTxs();let maxId=txs.length?Math.max(...txs.map(t=>t.id)):0;
      if(header.includes('data')&&header.includes('valor')&&header.includes('descri')){
        for(let i=1;i<lines.length;i++){
          const parts=parseCSVLine(lines[i]);if(parts.length<4)continue;
          const dr=parts[0].trim();let as=parts[1].trim();
          if(as.includes(',')&&!as.includes('.'))as=as.replace(',', '.');
          const desc=parts.slice(3).join(',').trim();if(!dr||!as||!desc)continue;
          const an=parseFloat(as);if(isNaN(an))continue;
          const type=an>0?'receita':'expense';const date=dr.split('/').reverse().join('-');maxId++;
          let cat='Other';const dl=desc.toLowerCase();
          if(an<0){
            if(dl.match(/aliment|supermerc|mercado|restaurante|pizzaria/))cat='Food';
            else if(dl.match(/telefonia|transit|transporte|uber/))cat='Transport';
            else if(dl.match(/aluguel|moradia|condom/))cat='Housing';
            else if(dl.match(/sa\u00fade|farm\u00e1cia|m\u00e9dico|hospital/))cat='Health';
            else if(dl.match(/lazer|cinema|netflix|spotify/))cat='Entertainment';
            else if(dl.match(/compra|loja|shopping/))cat='Shopping';
            else if(dl.match(/educa|curso|livro/))cat='Education';
          }else{
            if(dl.match(/sal\u00e1rio|recebida/))cat='Salary';
            else if(dl.match(/investimento|resgate/))cat='Investments';
            else if(dl.includes('freelance'))cat='Freelance';
          }
          txs.push({id:maxId,type,category:cat,description:desc,amount:safeRound(Math.abs(an)),date});count++;
        }
      }else if(header.includes('tipo')&&header.includes('categoria')){
        for(let i=1;i<lines.length;i++){
          const parts=parseCSVLine(lines[i]);if(parts.length<5)continue;
          const[type,category,...rest]=parts;
          const date=parts[parts.length-1].trim();const amount=parts[parts.length-2].trim();
          const description=rest.slice(0,-1).join(',').trim();
          if(!type||!category||!description||!amount||!date)continue;maxId++;
          txs.push({id:maxId,type:type.trim(),category:category.trim(),description:description.replace(/^"|"$/g,'').replace(/""/g,'"'),amount:parseFloat(amount),date});count++;
        }
      }else{toast('Formato n\u00e3o reconhecido','error');return;}
      saveTxs(txs);refresh();populateMonthFilter();toast(`${count} transa\u00e7\u00f5es importadas!`);
    }catch{toast('Erro ao ler CSV','error');}
    e.target.value='';
  });
}

function clearAll(){
  confirmDel('Apagar todos os dados? N\u00e3o tem volta.',()=>{
    localStorage.removeItem('finance_txs');localStorage.removeItem('finance_recurring');localStorage.removeItem('finance_budgets');
    refresh();populateMonthFilter();toast('Dados apagados','info');
  });
}

document.getElementById('month-sel').addEventListener('change',()=>{refresh();});
document.getElementById('clear-btn')?.addEventListener('click',clearAll);
document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
load();
